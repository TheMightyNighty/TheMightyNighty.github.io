name: Update Projects Data

on:
  schedule:
    - cron: '0 6 * * 1'   # Jeden Montag 6:00 UTC
  workflow_dispatch:        # Manuell auslösbar via GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch repo data from GitHub API
        run: node .github/scripts/fetch-projects.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit projects.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "chore: update projects.json [skip ci]"
          git push
